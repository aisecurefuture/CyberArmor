<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AiShields Status</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; width: 300px; }
    .row { display: flex; justify-content: space-between; margin-top: 6px; }
    .label { font-weight: bold; }
    .pill { padding: 4px 8px; border-radius: 12px; color: #fff; font-size: 12px; }
    .pill.ok { background: #2b8a3e; }
    .pill.err { background: #c92a2a; }
    button { margin-top: 12px; padding: 6px 10px; }
  </style>
</head>
<body>
  <h4>AiShields Browser Protection</h4>
  <div class="row"><span class="label">Telemetry</span><span id="telemetryStatus" class="pill err">Unknown</span></div>
  <div class="row"><span class="label">Endpoint</span><span id="endpoint" title=""></span></div>
  <div class="row"><span class="label">Tenant</span><span id="tenant"></span></div>
  <button id="test">Send test telemetry</button>
  <button id="options">Open settings</button>
  <div id="result" style="margin-top:8px;font-size:12px;color:#555;"></div>
  <script src="popup.js"></script>
</body>
</html>
