{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aishields.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aishields.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Dashboard
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aishields.fullname" . }}-dashboard
                port:
                  number: {{ .Values.adminDashboard.service.port }}
          # API routes
          - path: /api/v1/policies
            pathType: Prefix
            backend:
              service:
                name: {{ include "aishields.fullname" . }}-policy
                port:
                  number: {{ .Values.policy.service.port }}
          - path: /api/v1/detect
            pathType: Prefix
            backend:
              service:
                name: {{ include "aishields.fullname" . }}-detection
                port:
                  number: {{ .Values.detection.service.port }}
          - path: /api/v1/incidents
            pathType: Prefix
            backend:
              service:
                name: {{ include "aishields.fullname" . }}-response
                port:
                  number: {{ .Values.response.service.port }}
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "aishields.fullname" . }}-identity
                port:
                  number: {{ .Values.identity.service.port }}
          - path: /api/v1/siem
            pathType: Prefix
            backend:
              service:
                name: {{ include "aishields.fullname" . }}-siem-connector
                port:
                  number: {{ .Values.siemConnector.service.port }}
          - path: /api/v1/compliance
            pathType: Prefix
            backend:
              service:
                name: {{ include "aishields.fullname" . }}-compliance
                port:
                  number: {{ .Values.compliance.service.port }}
          # Default to control plane
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "aishields.fullname" . }}-control-plane
                port:
                  number: {{ .Values.controlPlane.service.port }}
{{- end }}
