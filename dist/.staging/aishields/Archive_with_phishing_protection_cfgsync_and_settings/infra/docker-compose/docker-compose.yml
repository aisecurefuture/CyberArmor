version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: cyberarmor
      POSTGRES_USER: cyberarmor
      POSTGRES_DB: cyberarmor
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  control-plane:
    build:
      context: ../../
      dockerfile: services/control-plane/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  policy:
    build:
      context: ../../
      dockerfile: services/policy/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8001:8001"

  detection:
    build:
      context: ../../
      dockerfile: services/detection/Dockerfile
    ports:
      - "8002:8002"

  response:
    build:
      context: ../../
      dockerfile: services/response/Dockerfile
    env_file:
      - .env
    ports:
      - "8003:8003"

  proxy-agent:
    build:
      context: ../../
      dockerfile: agents/proxy-agent/Dockerfile
    env_file:
      - .env
    depends_on:
      - policy
    ports:
      - "8010:8010"
  dashboard:
    image: nginx:alpine
    depends_on:
      - control-plane
      - policy
      - proxy-agent
    ports:
      - "5173:80"
    volumes:
      - ../../admin-dashboard:/usr/share/nginx/html:ro
      - ./nginx.dashboard.conf:/etc/nginx/conf.d/default.conf:ro
