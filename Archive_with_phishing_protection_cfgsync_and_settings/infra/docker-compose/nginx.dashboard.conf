server {
  listen 80;
  server_name _;

  # Serve the dashboard static files
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: send unknown routes to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Same-origin API reverse proxies
  location /api/control/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_pass http://control-plane:8000/;
  }

  location /api/policy/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_pass http://policy:8001/;
  }

  location /api/proxy/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_pass http://proxy-agent:8010/;
  }

  # (Optional) expose detection/response too if you want them in the UI later
  location /api/detection/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_pass http://detection:8002/;
  }
  location /api/response/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_pass http://response:8003/;
  }
}