# ---------------------------------------------------------------------------
# Admin Dashboard (Nginx)
# ---------------------------------------------------------------------------
adminDashboard:
  image:
    repository: admin-dashboard
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 80
  healthCheck:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------------------
# PostgreSQL
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  storage:
    size: 50Gi
    storageClass: ""
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  credentials:
    database: aishields
    username: aishields
    # password is stored in secrets.yaml; override via --set or external secret
    password: changeme-use-external-secret
  service:
    port: 5432

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # password is stored in secrets.yaml; override via --set or external secret
  password: changeme-use-external-secret
  service:
    port: 6379

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/rate-limit: "100"
  host: aishields.example.com
  tls:
    enabled: true
    secretName: aishields-tls

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true

# ---------------------------------------------------------------------------
# Monitoring
# ---------------------------------------------------------------------------
monitoring:
  prometheus:
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      additionalLabels: {}

# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/aishields
    # iam.gke.io/gcp-service-account: aishields@project.iam.gserviceaccount.com
  name: ""
