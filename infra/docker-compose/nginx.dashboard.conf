server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static dashboard files
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
    }

    # API reverse proxy - Control Plane
    location /api/control-plane/ {
        proxy_pass http://control-plane:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API reverse proxy - Policy Service
    location /api/policy/ {
        proxy_pass http://policy:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Detection Service
    location /api/detection/ {
        proxy_pass http://detection:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Response Service
    location /api/response/ {
        proxy_pass http://response:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Identity Service
    location /api/identity/ {
        proxy_pass http://identity:8004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - SIEM Connector
    location /api/siem/ {
        proxy_pass http://siem-connector:8005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Compliance Service
    location /api/compliance/ {
        proxy_pass http://compliance:8006/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Proxy Agent
    location /api/proxy-agent/ {
        proxy_pass http://proxy-agent:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
