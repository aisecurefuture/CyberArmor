# =============================================================================
# CyberArmor Protect - Helm Chart Values
# =============================================================================
# This file contains all configurable values for the CyberArmor Protect
# enterprise AI security platform.
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
global:
  namespace: aishields
  imagePullSecrets:
    - name: aishields-registry
  imageRegistry: ghcr.io/aishields
  environment: production
  pqcEnabled: true
  fipsMode: false
  logLevel: info

# ---------------------------------------------------------------------------
# Control Plane - Main API gateway
# ---------------------------------------------------------------------------
controlPlane:
  image:
    repository: control-plane
    tag: ""  # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env: {}
  service:
    type: ClusterIP
    port: 8000
  healthCheck:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------------------
# Policy Engine
# ---------------------------------------------------------------------------
policy:
  image:
    repository: policy
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env: {}
  service:
    type: ClusterIP
    port: 8001
  healthCheck:
